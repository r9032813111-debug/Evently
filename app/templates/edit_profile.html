{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2>Редактирование профиля</h2>

        <form method="POST">
            <div class="mb-3">
                <label>Имя пользователя</label>
                <input type="text" name="username" class="form-control" value="{{ current_user.username }}">
            </div>
            <div class="mb-3">
                <label>Email</label>
                <input type="email" name="email" class="form-control" value="{{ current_user.email }}">
            </div>
            <div class="mb-3">
                <label>Новый пароль (оставьте пустым, если не хотите менять)</label>
                <input type="password" name="password" class="form-control">
            </div>
            <button type="submit" class="btn btn-success">Сохранить изменения</button>
            <a href="{{ url_for('profile.profile') }}" class="btn btn-secondary">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}
